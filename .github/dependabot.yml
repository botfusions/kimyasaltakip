# ============================================
# Dependabot Configuration - Kimyasal Takip Sistemi
# ============================================
# Automatically creates PRs for dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2

updates:
  # Frontend (Next.js) dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Istanbul"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    # Group minor/patch updates together
    groups:
      production-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major version bumps (review manually)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
