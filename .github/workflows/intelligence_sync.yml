name: Kimyasal Takip - Canlı İstihbarat Senkronizasyonu

on:
  schedule:
    # Her gün gece 03:00'te çalışır (UTC)
    - cron: "0 3 * * *"
  workflow_dispatch: # Manuel tetikleme için

jobs:
  sync-intelligence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/crawler/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Sync Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Eğer OpenAI/Gemini embedding kullanacaksanız onları da buraya ekleyin:
          # OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python ./scripts/crawler/sync_intelligence.py
