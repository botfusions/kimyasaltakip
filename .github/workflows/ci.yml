# ============================================
# CI Pipeline - Kimyasal Takip Sistemi
# ============================================
# Runs on: push to main, pull requests
# Netlify handles deployment separately via GitHub integration

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: ./frontend

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Job 1: Lint & Type Check
  # ==========================================
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 ESLint check
        run: npm run lint

      - name: 🔷 TypeScript type check
        run: npx tsc --noEmit

  # ==========================================
  # Job 2: Build
  # ==========================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    # These env vars are needed for build but contain dummy values
    # Real values are set in Netlify dashboard
    env:
      NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
      SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build Next.js
        run: npm run build

      - name: 📊 Build size report
        run: |
          echo "## 📊 Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ | awk '{print "Total build size: " $1}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Static files" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null | awk '{print "Static assets: " $1}' >> $GITHUB_STEP_SUMMARY || echo "No static directory found" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Job 3: Security Audit
  # ==========================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔒 npm audit (production only)
        run: npm audit --production --audit-level=high || true
        continue-on-error: true

      - name: 🔍 Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          # Basic secret patterns check
          if grep -rn "sk_live\|sk_test\|AKIA\|password\s*=\s*['\"]" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.mjs" src/ 2>/dev/null; then
            echo "⚠️ Potential secrets found in source code!"
            exit 1
          else
            echo "✅ No secrets detected in source code"
          fi

      - name: 🔍 Check .env files not committed
        run: |
          if [ -f ".env.local" ] || [ -f ".env" ]; then
            echo "❌ ERROR: .env file found in repository!"
            exit 1
          else
            echo "✅ No .env files in repository"
          fi
